<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gracias — Athens Music</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#0b0b0d;
    color:#f2ede1;
    font-family:'Inter', sans-serif;
    text-align:center;
    padding:24px;
  }
  .box{max-width:480px;}
  h1{
    font-family:'Marcellus', serif;
    font-weight:400;
    font-size:2.2rem;
    color:#c9a227;
    margin-bottom:16px;
  }
  p{color:#cfc9bd; margin-bottom:32px; line-height:1.6;}
  a{
    display:inline-block;
    padding:14px 28px;
    border:1px solid #c9a227;
    color:#c9a227;
    text-decoration:none;
    text-transform:uppercase;
    letter-spacing:0.1em;
    font-size:0.85rem;
    transition:background .25s, color .25s;
  }
  a:hover{background:#c9a227;color:#0b0b0d;}
</style>
</head>
<body>
  <div class="box">
    <h1>Gracias por escribirnos</h1>
    <p>Recibimos tu mensaje. Nuestro equipo va a escuchar tu música y se pondrá en contacto contigo pronto.</p>
    <a href="/index.html">Volver al inicio</a>
  </div>
</body>
</html>
